<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic-ITC</title>
    <meta name="description" content="Semantic-ITC dataset demo page.">
    <meta property="og:title" content="Semantic-ITC">
    <meta property="og:description" content="Semantic-ITC dataset demo page.">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/template.css">
    <link rel="stylesheet" href="css/page.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="#home">Semantic-ITC</a>
            </div>
            <ul class="nav-menu">
                <li><a href="#home">Home</a></li>
                <li><a href="#demo">Demo</a></li>
            </ul>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-title-row">
                    <span class="hero-title-main">Semantic-ITC</span>
                </div>
                <h1 class="hero-title-sub">Dataset Demo Page</h1>
                <div class="hero-links">
                    <a href="https://github.com/haiyang2022/Semantic-ITC" class="btn btn-secondary" target="_blank" rel="noreferrer">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                </div>
                <div class="template-teaser">
                    <div class="template-teaser-card empty-card"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="demo" class="gallery">
        <div class="container">
            <h2>Semantic Classes</h2>
            <div id="pc-showcase" class="pc-showcase"></div>
            <h2 style="margin-top:3rem;">Semantic Point Cloud Examples Across Scenes</h2>
            <div id="pc-model-selector" class="pc-model-selector">
                <button class="pc-model-btn active" data-model="region2-1">Learning Area</button>
                <button class="pc-model-btn" data-model="region1-1">Corridor Area</button>
                <button class="pc-model-btn" data-model="baseline">Classroom</button>
                <button class="pc-model-btn" data-model="1310">Meeting Room</button>
                <button class="pc-model-btn" data-model="2104">Office</button>
            </div>
            <div class="pc-compare-layout-single">
                <article class="pc-compare-panel">
                    <h3 id="pc-current-title">Learning Area</h3>
                    <div class="pc-viewer-shell">
                        <div id="pc-compare-canvas" class="pc-compare-viewer"></div>
                        <div class="pc-control-stack">
                            <button id="pc-zoom-in" class="pc-control-btn" type="button">+</button>
                            <button id="pc-zoom-out" class="pc-control-btn" type="button">-</button>
                            <button id="pc-reset" class="pc-control-btn" type="button">⟳</button>
                        </div>
                    </div>
                    <div id="pc-view-status" class="pc-status">Loading point cloud...</div>
                </article>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Semantic-ITC</p>
        </div>
    </footer>

    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/three.min.js"></script>
    <script src="js/OrbitControls.js"></script>
    <script src="js/script.js"></script>
    <script src="js/wall-viewer.js"></script>
    <script src="js/compare-viewer.js"></script>
</body>
</html>
